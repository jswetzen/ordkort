:root {
  --ground: #241a12;
  --ground-2: #2f2318;
  --ground-2-line: rgba(198, 161, 90, 0.22);
  --paper: #f2e6ca;
  --ink: #211509;
  --ink-soft: rgba(33, 21, 9, 0.6);
  --cream: #f2e6ca;
  --cream-soft: rgba(242, 230, 202, 0.68);
  --cream-faint: rgba(242, 230, 202, 0.4);
  --brass: #c6a15b;
  --brass-bright: #e3c483;
  --brass-deep: #8c6d38;

  --enkelt: #7fa363;
  --enkelt-deep: #587a41;
  --mellan: #dc9c3c;
  --mellan-deep: #b1782a;
  --svart: #bd4a30;
  --svart-deep: #8f3521;

  --tier: var(--enkelt);
  --tier-deep: var(--enkelt-deep);
}

* { box-sizing: border-box; }

html, body {
  height: 100%;
}

body {
  margin: 0;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: clamp(18px, 5vw, 40px);
  background:
    radial-gradient(ellipse 120% 60% at 50% -8%, rgba(255, 255, 255, 0.06), transparent 60%),
    radial-gradient(ellipse 90% 70% at 50% 108%, rgba(0, 0, 0, 0.35), transparent 65%),
    repeating-linear-gradient(90deg, rgba(0, 0, 0, 0.09) 0px, transparent 1.5px 7px),
    var(--ground);
  color: var(--cream);
  font-family: 'Karla Text', system-ui, -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
  transition: background 0.4s ease;
}

body[data-tier="enkelt"] { --tier: var(--enkelt); --tier-deep: var(--enkelt-deep); }
body[data-tier="mellan"] { --tier: var(--mellan); --tier-deep: var(--mellan-deep); }
body[data-tier="svart"]  { --tier: var(--svart);  --tier-deep: var(--svart-deep); }

.stage {
  width: 100%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: clamp(18px, 3.4vh, 30px);
}

.header {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  text-align: center;
}

.eyebrow {
  margin: 0;
  font-family: 'Karla Text', sans-serif;
  font-weight: 700;
  font-size: 0.7rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--brass-bright);
}

.wordmark {
  margin: 0;
  font-family: 'Alfa Display', serif;
  font-weight: 400;
  font-size: clamp(2.3rem, 10vw, 3.2rem);
  letter-spacing: 0.03em;
  color: var(--cream);
  text-shadow: 0 3px 0 rgba(0, 0, 0, 0.4), 0 0 30px rgba(198, 161, 90, 0.22);
  text-wrap: balance;
}

.tagline {
  margin: 0;
  font-size: 0.85rem;
  color: var(--cream-soft);
  max-width: 30ch;
}

.dial {
  position: relative;
  width: 100%;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  background: var(--ground-2);
  border: 1px solid var(--ground-2-line);
  border-radius: 999px;
  padding: 5px;
  box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.45);
}

.dial-highlight {
  position: absolute;
  top: 5px;
  bottom: 5px;
  left: 5px;
  width: calc((100% - 10px) / 3);
  border-radius: 999px;
  background: var(--tier);
  transform: translateX(0%);
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.35s ease;
  box-shadow: 0 3px 10px rgba(0, 0, 0, 0.4);
  z-index: 0;
}

.dial button {
  position: relative;
  z-index: 1;
  appearance: none;
  border: none;
  background: none;
  padding: 11px 4px;
  font-family: 'Baloo Round', sans-serif;
  font-weight: 700;
  font-size: 0.92rem;
  color: var(--cream-soft);
  cursor: pointer;
  border-radius: 999px;
  transition: color 0.3s ease;
}

.dial button.active { color: var(--ink); }

.dial button:focus-visible {
  outline: 2px solid var(--brass-bright);
  outline-offset: 2px;
}

.card-wrap {
  width: 100%;
  display: flex;
  justify-content: center;
}

.card {
  position: relative;
  overflow: hidden;
  width: 100%;
  max-width: 360px;
  min-height: 208px;
  background: var(--paper);
  border-radius: 20px;
  padding: 34px 26px 26px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transform: rotate(-1.6deg);
  box-shadow: 0 20px 34px -12px rgba(0, 0, 0, 0.6), 0 1px 0 rgba(255, 255, 255, 0.35) inset;
}

.card::after {
  content: "";
  position: absolute;
  inset: 0;
  background-image: radial-gradient(rgba(33, 21, 9, 0.05) 1px, transparent 1px);
  background-size: 3px 3px;
  opacity: 0.55;
  pointer-events: none;
}

.tier-stripe {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 11px;
  background: var(--tier);
  transition: background 0.35s ease;
}

.word {
  position: relative;
  margin: 0;
  font-family: 'Alfa Display', serif;
  font-size: clamp(1.7rem, 8.6vw, 2.7rem);
  line-height: 1.08;
  text-transform: uppercase;
  color: var(--ink);
  text-align: center;
  text-wrap: balance;
  word-break: break-word;
}

.meta {
  position: relative;
  margin: 16px 0 0;
  font-family: 'Karla Text', sans-serif;
  font-weight: 700;
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-soft);
}

@keyframes popBounce {
  0%   { transform: scale(0.72) rotate(-7deg); opacity: 0; }
  55%  { transform: scale(1.09) rotate(3deg);  opacity: 1; }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

@keyframes popFade {
  0%   { transform: translateY(9px); opacity: 0; }
  100% { transform: translateY(0); opacity: 1; }
}

.card.drawing .word { animation: popFade 0.28s ease; }
body[data-tier="enkelt"] .card.drawing .word { animation: popBounce 0.45s cubic-bezier(0.68, -0.55, 0.27, 1.55); }

.btn-next {
  width: 100%;
  appearance: none;
  border: none;
  cursor: pointer;
  padding: 17px 20px;
  border-radius: 16px;
  font-family: 'Baloo Round', sans-serif;
  font-weight: 700;
  font-size: 1.08rem;
  letter-spacing: 0.01em;
  color: var(--ink);
  background: var(--brass);
  box-shadow: 0 6px 0 var(--brass-deep), 0 12px 20px rgba(0, 0, 0, 0.35);
  transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.2s ease;
}

.btn-next:hover { background: var(--brass-bright); }

.btn-next:active {
  transform: translateY(5px);
  box-shadow: 0 1px 0 var(--brass-deep), 0 4px 10px rgba(0, 0, 0, 0.3);
}

.btn-next:focus-visible {
  outline: 2px solid var(--cream);
  outline-offset: 3px;
}

.footer {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

.rules {
  margin: 0;
  text-align: center;
  font-size: 0.78rem;
  line-height: 1.55;
  color: var(--cream-soft);
  max-width: 34ch;
}

.reset-link {
  appearance: none;
  border: none;
  background: none;
  cursor: pointer;
  font-family: 'Karla Text', sans-serif;
  font-size: 0.72rem;
  letter-spacing: 0.04em;
  color: var(--cream-faint);
  text-decoration: underline;
  text-underline-offset: 3px;
  padding: 4px;
}

.reset-link:hover { color: var(--cream-soft); }
.reset-link:focus-visible { outline: 2px solid var(--brass-bright); outline-offset: 2px; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important;
  }
}

</head>
<body>
<div class="stage">
  <div class="header">

  </div>

  <div class="dial" role="group" aria-label="Svårighetsgrad">

      <p class="word" id="word">Ord</p>

  </div>

  <button type="button" class="btn-next" id="next">Nytt ord</button>

  <div class="footer">

  var TIERS = ['enkelt', 'mellan', 'svart'];
  var STORAGE_KEY = 'alias-ordkort-v1';

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function freshState() {
    var s = { tier: 'enkelt', decks: {}, lastWord: {} };
    TIERS.forEach(function (t) {
      s.decks[t] = shuffle(WORDS[t]);
      s.lastWord[t] = null;
    });
    return s;
  }

  function loadState() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        var parsed = JSON.parse(raw);
        var ok = parsed && parsed.decks && TIERS.every(function (t) { return Array.isArray(parsed.decks[t]); });
        if (ok) return parsed;
      }
    } catch (e) {}
    return null;
  }

  function saveState(s) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch (e) {}
  }

  var cardEl = document.getElementById('card');
  var wordEl = document.getElementById('word');
  var metaEl = document.getElementById('meta');
  var nextBtn = document.getElementById('next');
  var resetBtn = document.getElementById('resetAll');
  var dialHighlight = document.getElementById('dialHighlight');
  var dialButtons = Array.prototype.slice.call(document.querySelectorAll('.dial button'));

  function drawWord(tier) {
    var deck = state.decks[tier];
    if (deck.length === 0) {
      deck = shuffle(WORDS[tier]);
      if (deck.length > 1 && deck[0] === state.lastWord[tier]) {
        var tmp = deck[0]; deck[0] = deck[1]; deck[1] = tmp;
      }
    }
    var word = deck.shift();
    state.decks[tier] = deck;
    state.lastWord[tier] = word;
    saveState(state);
    return word;
  }

  function fitWordSize() {
    wordEl.style.fontSize = '';
    var maxWidth = wordEl.parentElement.clientWidth - 4;
    var tries = 0;
    while (wordEl.scrollWidth > maxWidth && tries < 12) {
      var current = parseFloat(getComputedStyle(wordEl).fontSize);
      wordEl.style.fontSize = (current - 1.5) + 'px';
      tries++;
    }
  }

  function render(word, tier) {
    wordEl.textContent = word;
    var remaining = state.decks[tier].length;
    var total = WORDS[tier].length;
    metaEl.textContent = remaining + ' av ' + total + ' ord kvar';
    body.setAttribute('data-tier', tier);

    dialButtons.forEach(function (btn) {
      var active = btn.dataset.tier === tier;
      btn.classList.toggle('active', active);
      btn.setAttribute('aria-pressed', active ? 'true' : 'false');
    });
    var idx = TIERS.indexOf(tier);
    dialHighlight.style.transform = 'translateX(' + (idx * 100) + '%)';

    cardEl.classList.remove('drawing');
    void cardEl.offsetWidth;
    cardEl.classList.add('drawing');
    fitWordSize();
  }

  function showNext() {
    var tier = state.tier;
    render(drawWord(tier), tier);
  }

  function switchTier(tier) {
    if (tier === state.tier) { showNext(); return; }
    state.tier = tier;
    saveState(state);
    render(drawWord(tier), tier);
  }

  dialButtons.forEach(function (btn) {
    btn.addEventListener('click', function () { switchTier(btn.dataset.tier); });
  });
  nextBtn.addEventListener('click', showNext);

  resetBtn.addEventListener('click', function () {
    state = freshState();
    saveState(state);
    render(drawWord(state.tier), state.tier);
  });

  window.addEventListener('keydown', function (e) {
    if (e.code === 'Space') { e.preventDefault(); showNext(); }
  });

  window.addEventListener('resize', fitWordSize);

  render(drawWord(state.tier), state.tier);
})();
